name: CI - Model Training

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: pip install mlflow==2.19.0 scikit-learn==1.4.2 pandas==2.2.2 numpy==1.26.4 matplotlib==3.8.4

      - name: Run mlflow project
        run: mlflow run MLProject --env-manager=local

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          EXP_DIR=$(find mlruns -maxdepth 1 -mindepth 1 -type d ! -name '.trash' | head -1)
          RUN_ID=$(find $EXP_DIR -maxdepth 1 -mindepth 1 -type d ! -name 'meta.yaml' ! -name 'datasets' | head -1 | xargs basename)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "EXP_ID=$(basename $EXP_DIR)" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"

      - name: Install Python dependencies
        run: pip install docker

      - name: Upload to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f mlruns/
          git diff --cached --quiet || git commit -m "ci: update model artifacts [skip ci]"
          git push

      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            -m mlruns/${{ env.EXP_ID }}/${{ env.RUN_ID }}/artifacts/model \
            -n ${{ secrets.DOCKER_USERNAME }}/diabetes-mlflow \
            --env-manager local

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Docker Image
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/diabetes-mlflow ${{ secrets.DOCKER_USERNAME }}/diabetes-mlflow:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/diabetes-mlflow:latest
