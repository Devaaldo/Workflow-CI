name: CI - Model Training

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install mlflow==2.17.0 scikit-learn==1.4.2 pandas==2.2.2 numpy==1.26.4 matplotlib==3.8.4

      - name: Run MLflow Project
        run: mlflow run MLProject --env-manager=local

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        run: |
          RUN_ID=$(find mlruns/0 -maxdepth 1 -mindepth 1 -type d ! -name 'datasets' | head -1 | xargs basename)
          echo "Run ID: $RUN_ID"
          mlflow models build-docker -m mlruns/0/$RUN_ID/artifacts/model -n ${{ secrets.DOCKER_USERNAME }}/diabetes-mlflow --env-manager local
          docker push ${{ secrets.DOCKER_USERNAME }}/diabetes-mlflow

      - name: Save artifacts to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f mlruns/
          git diff --cached --quiet || git commit -m "ci: update model artifacts [skip ci]"
          git push
